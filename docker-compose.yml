services:
  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_PORT}:8080"
    networks:
      - infrastructure_network
    environment:
      - DOZZLE_LEVEL=${DOZZLE_LEVEL}
    restart: always
    mem_limit: 4g
    mem_reservation: 2g
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"
networks:
  infrastructure_network:
    external: true